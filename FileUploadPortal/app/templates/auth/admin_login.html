{% extends "base.html" %}
{% block title %}Admin Login - FileUploadPortal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill display-5 text-dark"></i>
                    <h3 class="mt-2">Administrator Login</h3>
                </div>

                <form method="POST" action="{{ url_for('auth.admin_login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input
                            type="text" class="form-control" id="username"
                            name="username" required autofocus
                        >
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input
                            type="password" class="form-control" id="password"
                            name="password" required
                        >
                    </div>
                    <button type="submit" class="btn btn-dark w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Login
                    </button>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        Not an admin? <a href="{{ url_for('auth.user_login') }}">User login</a>
                    </small>
                </div>

                <hr>
                <p class="text-center text-muted small mb-0">
                    Default credentials (first run): <code>admin</code> / <code>admin123</code>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
